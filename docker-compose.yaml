services:
    prometheus:
        image: prom/prometheus
        command:
            - '--config.file=/etc/prometheus/prometheus.yml'
            - '--storage.tsdb.retention.time=30d'
        volumes:
            - ./prometheus:/etc/prometheus
            - prom_data:/prometheus
        deploy:
            labels:
                - traefik.enable=true

                - traefik.http.services.obs_prometheus.loadbalancer.server.port=9090

                - traefik.http.routers.obs_prometheus.rule=Host(`prometheus.local.barlito.fr`)
                - traefik.http.routers.obs_prometheus.entrypoints=http

                - traefik.http.routers.obs_prometheus-secure.rule=Host(`prometheus.local.barlito.fr`)
                - traefik.http.routers.obs_prometheus-secure.entrypoints=https
                - traefik.http.routers.obs_prometheus-secure.tls=true
                - traefik.http.routers.obs_prometheus-secure.middlewares=authelia-auth@file,security-headers@file
        networks:
            - obs_internal
            - traefik_traefik_proxy

    grafana:
        image: grafana/grafana
        environment:
            GF_AUTH_PROXY_ENABLED: "true"
            GF_AUTH_PROXY_HEADER_NAME: Remote-User
            GF_AUTH_PROXY_HEADER_PROPERTY: username
            GF_AUTH_PROXY_AUTO_SIGN_UP: "true"
            GF_AUTH_PROXY_HEADERS: "Email:Remote-Email Name:Remote-Name"
            GF_AUTH_BASIC_ENABLED: "false"
            GF_AUTH_DISABLE_LOGIN_FORM: "true"
            GF_USERS_ALLOW_SIGN_UP: "false"
        volumes:
            - ./grafana:/etc/grafana/provisioning/datasources
            - grafana_data:/var/lib/grafana
        deploy:
            labels:
                - traefik.enable=true

                - traefik.http.services.obs_grafana.loadbalancer.server.port=3000

                - traefik.http.routers.obs_grafana.rule=Host(`grafana.local.barlito.fr`)
                - traefik.http.routers.obs_grafana.entrypoints=http

                - traefik.http.routers.obs_grafana-secure.rule=Host(`grafana.local.barlito.fr`)
                - traefik.http.routers.obs_grafana-secure.entrypoints=https
                - traefik.http.routers.obs_grafana-secure.tls=true
                - traefik.http.routers.obs_grafana-secure.middlewares=authelia-auth@file,security-headers@file
        networks:
            - obs_internal
            - traefik_traefik_proxy

    loki:
        image: grafana/loki:3.4
        command: -config.file=/etc/loki/loki.yml
        ports:
            - 3100:3100
        volumes:
            - ./loki:/etc/loki
            - loki_data:/loki
        networks:
            - obs_internal

    tempo:
        image: grafana/tempo:latest
        command: -config.file=/etc/tempo/tempo.yml
        volumes:
            - ./tempo:/etc/tempo
            - tempo_data:/var/tempo
        networks:
            - obs_internal

    dozzle:
        image: amir20/dozzle:latest
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock:ro
        deploy:
            labels:
                - traefik.enable=true

                - traefik.http.services.obs_dozzle.loadbalancer.server.port=8080

                - traefik.http.routers.obs_dozzle.rule=Host(`dozzle.local.barlito.fr`)
                - traefik.http.routers.obs_dozzle.entrypoints=http

                - traefik.http.routers.obs_dozzle-secure.rule=Host(`dozzle.local.barlito.fr`)
                - traefik.http.routers.obs_dozzle-secure.entrypoints=https
                - traefik.http.routers.obs_dozzle-secure.tls=true
                - traefik.http.routers.obs_dozzle-secure.middlewares=authelia-auth@file,security-headers@file
        networks:
            - traefik_traefik_proxy

    beszel:
        image: henrygd/beszel
        environment:
            APP_URL: http://beszel:8090
        volumes:
            - beszel_data:/beszel_data
        deploy:
            labels:
                - traefik.enable=true

                - traefik.http.services.obs_beszel.loadbalancer.server.port=8090

                - traefik.http.routers.obs_beszel.rule=Host(`beszel.local.barlito.fr`)
                - traefik.http.routers.obs_beszel.entrypoints=http

                - traefik.http.routers.obs_beszel-secure.rule=Host(`beszel.local.barlito.fr`)
                - traefik.http.routers.obs_beszel-secure.entrypoints=https
                - traefik.http.routers.obs_beszel-secure.tls=true
        networks:
            - obs_internal
            - traefik_traefik_proxy

    log-generator:
        image: alpine:latest
        command: >
            sh -c 'i=0; while true; do
            i=$$((i+1));
            level=$$([ $$((i % 10)) -eq 0 ] && echo "error" || ([ $$((i % 4)) -eq 0 ] && echo "warn" || echo "info"));
            echo "{\"level\":\"$$level\",\"msg\":\"request processed\",\"request_id\":$$i,\"duration_ms\":$$((RANDOM % 500))}";
            sleep 5; done'
        logging:
            driver: loki
            options:
                loki-url: "http://localhost:3100/loki/api/v1/push"
                loki-retries: "3"
        networks:
            - obs_internal

volumes:
    prom_data:
    grafana_data:
    loki_data:
    beszel_data:
    tempo_data:

networks:
    traefik_traefik_proxy:
        external: true
    obs_internal:
        driver: overlay
